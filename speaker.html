<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logos/logo-frontkom-symbol-outlined.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A0054" />
    <title>Speaker view · AI+ Halden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400&family=Red+Hat+Text:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="speaker">
      <header class="sp-header">
        <div class="sp-pos">— / —</div>
        <div class="sp-status">Venter på presentasjon …</div>
      </header>

      <section class="sp-current">
        <div class="sp-eyebrow">Nå</div>
        <h1 class="sp-title">—</h1>
      </section>

      <section class="sp-progress">
        <svg class="sp-ring" viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="sp-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#F86233"/>
              <stop offset="50%" stop-color="#BC25A9"/>
              <stop offset="100%" stop-color="#521CE4"/>
            </linearGradient>
          </defs>
          <circle class="sp-ring-bg" cx="60" cy="60" r="52"/>
          <circle class="sp-ring-fg" cx="60" cy="60" r="52" pathLength="100"/>
        </svg>
        <div class="sp-ring-text">
          <div class="sp-ring-now">0:00</div>
          <div class="sp-ring-of">/ 0:00</div>
        </div>
      </section>

      <section class="sp-next">
        <div class="sp-eyebrow">Neste</div>
        <h2 class="sp-next-title">—</h2>
      </section>

      <footer class="sp-total">
        <div class="sp-eyebrow">Total tid igjen</div>
        <div class="sp-total-value">--:--</div>
      </footer>

      <div class="sp-help">
        <kbd>Space</kbd> pause · <kbd>→</kbd> neste · <kbd>f</kbd> start
      </div>
    </div>
    <script type="module" src="/src/speaker.ts"></script>
  </body>
</html>
